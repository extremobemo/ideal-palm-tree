<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retro TV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; flex-direction: column;
         align-items: center; justify-content: center; height: 100vh; gap: 10px; }
  canvas { display: block; cursor: crosshair; }
  #ui { color: #888; font: 12px monospace; text-align: center; }
  #mp-bar { color: #888; font: 12px monospace; text-align: center; margin-top: 4px; }
  #mp-bar button { background:#222; border:1px solid #444; border-radius:4px; color:#ddd;
                   padding:4px 12px; cursor:pointer; font:12px monospace; }
  #mp-bar button:hover { background:#333; }
  #overlay {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: rgba(0,0,0,0.5);
    color: #ccc; font: 16px monospace; flex-direction: column; gap: 10px;
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #overlay h2 { color: #fff; }
  label {
    display: inline-block; padding: 6px 14px; background: #222;
    border: 1px solid #444; border-radius: 4px; cursor: pointer; color: #ddd;
  }
  label:hover { background: #333; }
  #wrap { position: relative; }
</style>
</head>
<body>
<!-- N64Wasm renders here; off-screen so it doesn't appear in layout -->
<canvas id="n64canvas" width="640" height="480"
        style="position:fixed;top:-1000px;left:-1000px;"></canvas>
<script>
// Force preserveDrawingBuffer on n64canvas so texImage2D can read rendered frames
(function() {
  var c = document.getElementById('n64canvas');
  var orig = c.getContext.bind(c);
  c.getContext = function(type, attrs) {
    if (type === 'webgl2' || type === 'webgl') {
      attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
    }
    return orig(type, attrs);
  };
})();
</script>

<div id="wrap">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <h2>Retro TV</h2>
    <p>Click to enter &nbsp;|&nbsp; ESC to release mouse</p>
    <p style="font-size:11px; color:#666">
      WASD: move &nbsp;|&nbsp; Mouse: look<br>
      Arrows: D-pad &nbsp;|&nbsp; Z: A &nbsp;|&nbsp; X: B &nbsp;|&nbsp; Enter: Start &nbsp;|&nbsp; Shift: Select
    </p>
  </div>
</div>
<div id="ui">
  <label>Load ROM
    <input type="file" id="rom-input" accept=".gb,.gbc,.sfc,.smc,.fig,.swc,.bs,.z64,.n64,.v64,.chd,.cue,.bin,.img" hidden multiple>
  </label>
  &nbsp;
  <label>PS1 BIOS
    <input type="file" id="bios-input" accept=".bin" hidden>
  </label>
  &nbsp; <span id="status">No ROM loaded</span>
</div>
<div id="mp-bar">
  <button onclick="mpHost()">Host</button>
  &nbsp;
  <input id="join-id" placeholder="Peer ID" size="10" style="background:#222;border:1px solid #444;color:#ddd;padding:4px 8px;border-radius:4px;font:12px monospace">
  <button onclick="mpJoin()">Join</button>
  &nbsp; <span id="mp-status" style="color:#aaa;font:12px monospace"></span>
</div>

<script>
const canvas = document.getElementById('canvas');
const overlay = document.getElementById('overlay');

// Size canvas to ~90% of window, 16:9
(function sizeCanvas() {
  const pad = 80; // space for UI bar below
  const maxW = Math.round(window.innerWidth * 0.75);
  const maxH = window.innerHeight - pad;
  const aspect = 16 / 9;
  let w = maxW, h = Math.round(maxW / aspect);
  if (h > maxH) { h = maxH; w = Math.round(h * aspect); }
  canvas.width  = w;
  canvas.height = h;
  // Lock dimensions — n64wasm's SDL fires resize events that would otherwise
  // shrink this canvas to the N64 native resolution.
  Object.defineProperty(canvas, 'width',  { get: () => w, set: () => {} });
  Object.defineProperty(canvas, 'height', { get: () => h, set: () => {} });
})();

// ── Multiplayer state ─────────────────────────────────────────
let frontendGL  = null;   // Emscripten GL table (captured after core loads)
let frontendCtx = null;   // WebGL1 context of #canvas
let peerInst    = null;
let mpConns     = [];     // active DataConnections
let gameStream  = null;   // MediaStream sent as host
let mpIsHost    = false;

// Hidden canvas that always holds the latest game frame (for WebRTC video)
const shareCanvas = document.createElement('canvas');
shareCanvas.width = 640; shareCanvas.height = 480;
const shareCtx = shareCanvas.getContext('2d');

function mpSetStatus(msg) {
  document.getElementById('mp-status').textContent = msg;
}

// Copy libretro frame from WASM heap → shareCanvas each animation frame.
// Frames are scaled to fill the full 640×480 shareCanvas so the receiver
// sees a full-TV image regardless of the core's native resolution.
const frameTmp = document.createElement('canvas');
let   frameTmpCtx = null;
function startFrameCapture() {
  (function loop() {
    if (coreModule) {
      const ptr = coreModule.ccall('get_frame_ptr', 'number', [], []);
      if (ptr) {
        const fw = coreModule.ccall('get_frame_w', 'number', [], []);
        const fh = coreModule.ccall('get_frame_h', 'number', [], []);
        if (fw > 0 && fh > 0) {
          // Resize scratch canvas if resolution changed
          if (frameTmp.width !== fw || frameTmp.height !== fh) {
            frameTmp.width = fw; frameTmp.height = fh;
            frameTmpCtx = frameTmp.getContext('2d');
          }
          const raw = new Uint8ClampedArray(coreModule.HEAPU8.buffer, ptr, fw * fh * 4);
          frameTmpCtx.putImageData(new ImageData(new Uint8ClampedArray(raw), fw, fh), 0, 0);
          // Scale to fill 640×480 for the stream
          shareCtx.drawImage(frameTmp, 0, 0, 640, 480);
        }
      }
    }
    requestAnimationFrame(loop);
  })();
  gameStream = shareCanvas.captureStream(30);
}

// Blit received video stream into the TV texture (same pattern as N64)
function setupVideoReceive(stream) {
  const videoEl = document.createElement('video');
  videoEl.autoplay = true; videoEl.playsInline = true; videoEl.muted = true;
  videoEl.srcObject = stream;
  videoEl.play().catch(e => console.warn('mp video:', e));

  const texId = coreModule.ccall('get_game_tex_id', 'number', [], []);
  coreModule.ccall('set_frame_size', 'void', ['number','number'], [640, 480]);
  (function blitLoop() {
    if (videoEl.readyState >= 2 && frontendGL && frontendCtx) {
      const tex = frontendGL.textures[texId];
      if (tex) {
        frontendCtx.bindTexture(frontendCtx.TEXTURE_2D, tex);
        frontendCtx.texImage2D(frontendCtx.TEXTURE_2D, 0,
          frontendCtx.RGBA, frontendCtx.RGBA, frontendCtx.UNSIGNED_BYTE, videoEl);
        frontendCtx.texParameteri(frontendCtx.TEXTURE_2D,
          frontendCtx.TEXTURE_MIN_FILTER, frontendCtx.LINEAR);
      }
    }
    requestAnimationFrame(blitLoop);
  })();
}

function startPositionSync(conn) {
  setInterval(function() {
    if (!conn.open || !coreModule) return;
    conn.send({ type: 'pos',
      x:   coreModule.ccall('get_local_x',   'number', [], []),
      y:   coreModule.ccall('get_local_y',   'number', [], []),
      z:   coreModule.ccall('get_local_z',   'number', [], []),
      yaw: coreModule.ccall('get_local_yaw', 'number', [], [])
    });
  }, 50); // 20 Hz
}

function mpHost() {
  mpIsHost = true;
  startFrameCapture();
  peerInst = new Peer();
  peerInst.on('error', e => mpSetStatus('Peer error: ' + e.type));
  peerInst.on('open', function(id) {
    mpSetStatus('Your ID: ' + id + '  (share with guest)');
  });
  peerInst.on('connection', function(conn) {
    mpConns.push(conn);
    const remoteId = mpConns.length - 1;
    conn.on('open', function() {
      mpSetStatus('Guest connected');
      startPositionSync(conn);
    });
    conn.on('data', function(data) {
      if (data.type === 'pos' && coreModule)
        coreModule.ccall('set_remote_player', 'void',
          ['number','number','number','number','number'],
          [remoteId, data.x, data.y, data.z, data.yaw]);
    });
    conn.on('close', function() {
      if (coreModule) coreModule.ccall('remove_remote_player','void',['number'],[remoteId]);
      mpConns.splice(mpConns.indexOf(conn), 1);
      mpSetStatus('Guest disconnected');
    });
  });
  peerInst.on('call', function(call) {
    call.answer(gameStream || new MediaStream());
  });
}

function mpJoin() {
  const hostId = document.getElementById('join-id').value.trim();
  if (!hostId) { mpSetStatus('Enter a peer ID first'); return; }
  mpIsHost = false;
  mpSetStatus('Loading scene...');

  // Guest just needs the 3D room — load game_gbc.js without a ROM
  loadCore('game_gbc.js', function() {
    mpSetStatus('Connecting...');
    peerInst = new Peer();
    peerInst.on('error', e => mpSetStatus('Peer error: ' + e.type));
    peerInst.on('open', function() {
      // Data channel for positions
      const conn = peerInst.connect(hostId, { reliable: false });
      conn.on('open', function() {
        mpSetStatus('In room with ' + hostId);
        startPositionSync(conn);
      });
      conn.on('data', function(data) {
        if (data.type === 'pos' && coreModule)
          coreModule.ccall('set_remote_player', 'void',
            ['number','number','number','number','number'],
            [0, data.x, data.y, data.z, data.yaw]);
      });
      conn.on('close', function() {
        if (coreModule) coreModule.ccall('remove_remote_player','void',['number'],[0]);
        mpSetStatus('Host disconnected');
      });

      // Video — caller must include a video track in the offer so the SDP has a
      // video section; otherwise the answerer (host) can't send their stream back.
      const dummyCanvas = document.createElement('canvas');
      dummyCanvas.width = 2; dummyCanvas.height = 2;
      const callStream = dummyCanvas.captureStream
        ? dummyCanvas.captureStream(1)
        : new MediaStream();
      const call = peerInst.call(hostId, callStream);
      call.on('stream', function(stream) {
        // Use only the host's video track(s)
        const vTracks = stream.getVideoTracks();
        if (!vTracks.length) { mpSetStatus('No video track received'); return; }
        mpSetStatus('Receiving game from ' + hostId);
        setupVideoReceive(new MediaStream(vTracks));
      });
      call.on('error', e => mpSetStatus('Call error: ' + e));
    });
  });
}

// ── Core routing ──────────────────────────────────────────────
const CORE_MAP = {
  'gb':  'game_gbc.js',
  'gbc': 'game_gbc.js',
  'sfc': 'game_snes.js',
  'smc': 'game_snes.js',
  'fig': 'game_snes.js',
  'swc': 'game_snes.js',
  'bs':  'game_snes.js',
  'bin': 'game_ps1.js',
  'cue': 'game_ps1.js',
  'chd': 'game_ps1.js',
  'img': 'game_ps1.js',
};
const N64_EXTS = new Set(['z64', 'n64', 'v64']);
const PS1_EXTS = new Set(['bin', 'cue', 'chd', 'img']);

let coreModule = null;   // libretro frontend module (game_gbc.js or game_snes.js)
let loadedCore = null;
let n64Module  = null;   // n64wasm module
let n64Running = false;
let ps1BiosLoaded = false;  // true once a BIOS file has been written to /system/

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

window.onerror = function(msg, src, line) {
  setStatus('JS error: ' + msg + ' (' + (src||'').split('/').pop() + ':' + line + ')');
};

// Inject a script and poll until window.Module.calledRun is true.
// Saves the GL object BEFORE the new script can overwrite window.GL.
function injectAndWait(src, onReady, onError) {
  const s = document.createElement('script');
  s.src = src;
  s.onerror = function() { setStatus('Failed to load ' + src); if (onError) onError(); };
  document.body.appendChild(s);
  function check() {
    if (window.Module && window.Module.calledRun) {
      onReady(window.Module);
    } else {
      setTimeout(check, 100);
    }
  }
  setTimeout(check, 200);
}

function loadCore(bundle, callback) {
  if (loadedCore === bundle) { callback(); return; }
  if (loadedCore !== null || n64Running) {
    if (!confirm('Loading a different core requires a page reload. Continue?')) return;
    location.reload();
    return;
  }
  setStatus('Loading core...');
  injectAndWait(bundle, function(mod) {
    coreModule = mod;
    loadedCore = bundle;
    if (!frontendGL) {
      frontendGL  = window.GL;
      frontendCtx = document.getElementById('canvas').getContext('webgl');
    }
    callback();
  });
}

// ── N64 loading ───────────────────────────────────────────────
// n64wasm.js (Emscripten 2.0.7) uses function/var declarations that conflict
// with class/let declarations in game_gbc.js (newer Emscripten) in the shared
// global lexical scope.  Fix: fetch the script as text, wrap it in an IIFE so
// all its declarations stay local, then expose only Module via window._n64M.
function loadN64Wasm(callback) {
  window._n64ModuleInit = {
    canvas: document.getElementById('n64canvas'),
    noInitialRun: true,
    locateFile: function(path) { return path; }
  };
  fetch('n64wasm.js')
    .then(function(r) { return r.text(); })
    .then(function(code) {
      var wrapped = '(function(){\nvar Module=window._n64ModuleInit||{};\n'
                  + code
                  + '\nif(typeof FS!=="undefined")Module.FS=FS;\n'
                  + 'if(typeof callMain!=="undefined")Module.callMain=callMain;\n'
                  + 'window._n64M=Module;\n})();';
      var blob = new Blob([wrapped], {type: 'application/javascript'});
      var url  = URL.createObjectURL(blob);
      var s = document.createElement('script');
      s.src = url;
      s.onerror = function() { setStatus('Failed to execute n64wasm.js'); };
      document.body.appendChild(s);
      (function check() {
        if (window._n64M && window._n64M.calledRun) {
          URL.revokeObjectURL(url);
          callback(window._n64M);
        } else {
          setTimeout(check, 100);
        }
      })();
    })
    .catch(function() { setStatus('Failed to fetch n64wasm.js'); });
}

function loadN64(file) {
  if (loadedCore !== null || n64Running) {
    if (!confirm('Loading N64 requires a page reload. Continue?')) return;
    location.reload();
    return;
  }
  setStatus('Loading N64 frontend...');

  // Step 1: load game_gbc.js for the 3D TV scene (no libretro ROM needed)
  injectAndWait('game_gbc.js', function(frontendMod) {
    coreModule = frontendMod;
    loadedCore = 'game_gbc.js';

    // Save game_gbc's GL table NOW before n64wasm can overwrite window.GL
    // Use local names that don't shadow the module-level vars, then set both.
    var n64GL  = window.GL;
    var n64Ctx = document.getElementById('canvas').getContext('webgl');
    if (!frontendGL) { frontendGL = n64GL; frontendCtx = n64Ctx; }
    var texId = coreModule.ccall('get_game_tex_id', 'number', [], []);
    // Tell the CRT shader that the game texture is N64-sized, not GBC-sized
    coreModule.ccall('set_frame_size', 'void', ['number','number'], [640, 480]);

    setStatus('Loading N64 emulator...');

    // Step 2: load n64wasm isolated in an IIFE
    loadN64Wasm(function(n64Mod) {
      n64Module = n64Mod;

      // Step 3: write ROM and start
      setStatus('Loading ' + file.name + '...');
      var reader = new FileReader();
      reader.onload = function(ev) {
        var romBytes = new Uint8Array(ev.target.result);

        // N64Wasm requires assets.zip, config.txt, and cheat.txt on the
        // virtual FS before callMain — same as their official demo does.
        fetch('assets.zip')
          .then(function(r) { return r.arrayBuffer(); })
          .then(function(assetsBuf) {
            var fs = n64Module.FS;
            fs.writeFile('assets.zip', new Uint8Array(assetsBuf));

            // config.txt format: one value per line, matching WriteConfigFile()
            // in N64Wasm's script.js (gamepad mappings, keyboard mappings, settings)
            var cfg = [
              '12','13','14','15','0','2','9','4','6','5','11','-1','-1','-1','-1',
              'b','n','y','h','Enter','i','k','j','l','a','q','e','s','d','`',
              'Up','Down','Left','Right',
              '0','0','0', // save files
              '0','0','1', // fps, swap sticks, disable audio sync (1=free-running)
              '0','0','0', // invert Y axis 2/3/4P
              '0','0','0','0' // mobile, angrylion, mouse, vbo
            ].join('\r\n') + '\r\n';
            fs.writeFile('config.txt', cfg);
            fs.writeFile('cheat.txt', '');

            fs.writeFile('custom.v64', romBytes);
            // Unlock the browser's audio context (user gesture already happened
            // via the file picker, so this will succeed)
            try { new AudioContext().resume(); } catch(e) {}
            n64Module.callMain(['custom.v64']);
            n64Running = true;
            setStatus('Playing: ' + file.name);

            // Step 4: copy n64canvas → g_game_tex every frame.
            // Firefox refuses texImage2D(webgl2Canvas) into a WebGL1 context,
            // so we blit through an intermediate 2D canvas first.
            var n64canvas = document.getElementById('n64canvas');
            var blitCanvas = document.createElement('canvas');
            blitCanvas.width  = n64canvas.width;
            blitCanvas.height = n64canvas.height;
            var blit2d = blitCanvas.getContext('2d');
            (function copyLoop() {
              if (n64Running) {
                var tex = n64GL.textures[texId];
                if (tex) {
                  blit2d.drawImage(n64canvas, 0, 0);
                  n64Ctx.bindTexture(n64Ctx.TEXTURE_2D, tex);
                  n64Ctx.texImage2D(n64Ctx.TEXTURE_2D, 0,
                    n64Ctx.RGBA, n64Ctx.RGBA,
                    n64Ctx.UNSIGNED_BYTE, blitCanvas);
                  n64Ctx.texParameteri(n64Ctx.TEXTURE_2D,
                    n64Ctx.TEXTURE_MIN_FILTER, n64Ctx.LINEAR);
                  n64Ctx.texParameteri(n64Ctx.TEXTURE_2D,
                    n64Ctx.TEXTURE_MAG_FILTER, n64Ctx.LINEAR);
                  // Mirror to shareCanvas for WebRTC streaming (scaled to fill)
                  shareCtx.drawImage(blitCanvas, 0, 0, 640, 480);
                }
              }
              requestAnimationFrame(copyLoop);
            })();
          })
          .catch(function() { setStatus('Failed to load assets.zip'); });
      };
      reader.readAsArrayBuffer(file);
    });
  });
}

// ── Pointer lock ─────────────────────────────────────────────
canvas.addEventListener('click', () => canvas.requestPointerLock());

document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === canvas) {
    overlay.classList.add('hidden');
  } else {
    overlay.classList.remove('hidden');
  }
});

document.addEventListener('mousemove', e => {
  if (document.pointerLockElement === canvas && coreModule) {
    coreModule.ccall('add_mouse_delta', 'void', ['number','number'],
                 [e.movementX, e.movementY]);
  }
});

// ── Movement keys (WASD) ─────────────────────────────────────
const MOVE_MAP = { 'KeyW':0, 'KeyS':1, 'KeyA':2, 'KeyD':3 };

// ── Game controller keys ──────────────────────────────────────
// RETRO_DEVICE_ID_JOYPAD: B=0 Y=1 SELECT=2 START=3 UP=4 DOWN=5 LEFT=6 RIGHT=7 A=8
const GAME_MAP = {
  'ArrowUp':    4,
  'ArrowDown':  5,
  'ArrowLeft':  6,
  'ArrowRight': 7,
  'Enter':      3,
  'ShiftLeft':  2,
  'ShiftRight': 2,
  'KeyZ':       8,  // A button
  'KeyX':       0,  // B button
  'KeyQ':      10,  // L
  'KeyE':      11,  // R
};

document.addEventListener('keydown', e => {
  if (!coreModule) return;
  if (MOVE_MAP[e.code] !== undefined) {
    e.preventDefault();
    coreModule.ccall('set_move_key','void',['number','number'],[MOVE_MAP[e.code],1]);
  }
  if (GAME_MAP[e.code] !== undefined) {
    e.preventDefault();
    coreModule.ccall('set_button','void',['number','number'],[GAME_MAP[e.code],1]);
  }
});

document.addEventListener('keyup', e => {
  if (!coreModule) return;
  if (MOVE_MAP[e.code] !== undefined)
    coreModule.ccall('set_move_key','void',['number','number'],[MOVE_MAP[e.code],0]);
  if (GAME_MAP[e.code] !== undefined)
    coreModule.ccall('set_button','void',['number','number'],[GAME_MAP[e.code],0]);
});

// ── PS1 BIOS loading ──────────────────────────────────────────
document.getElementById('bios-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    // BIOS must be written after the PS1 core module loads (it owns the FS).
    // We stash the bytes and write them just before start_game instead.
    window._ps1BiosName  = file.name;
    window._ps1BiosBytes = new Uint8Array(ev.target.result);
    ps1BiosLoaded = true;
    setStatus('BIOS ready: ' + file.name + ' — now load a PS1 disc');
  };
  reader.readAsArrayBuffer(file);
});

// ── ROM loading ───────────────────────────────────────────────
document.getElementById('rom-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();

  if (N64_EXTS.has(ext)) {
    loadN64(file);
    return;
  }

  const bundle = CORE_MAP[ext];
  if (!bundle) {
    setStatus('Unsupported format: .' + ext);
    return;
  }

  if (PS1_EXTS.has(ext)) {
    if (!ps1BiosLoaded) {
      setStatus('Load a PS1 BIOS (.bin) first, then reload your disc');
      return;
    }
    loadCore(bundle, function() {
      // Write BIOS into /system/ on the now-ready FS
      try { coreModule.FS.mkdir('/system'); } catch(e) {}
      try { coreModule.FS.mkdir('/saves');  } catch(e) {}
      coreModule.FS.writeFile('/system/' + window._ps1BiosName, window._ps1BiosBytes);

      setStatus('Loading ' + file.name + '...');
      const reader = new FileReader();
      reader.onload = function(ev) {
        const romPath = '/' + file.name;
        coreModule.FS.writeFile(romPath, new Uint8Array(ev.target.result));
        // For .cue discs the entry point is the .cue file itself
        coreModule.ccall('start_game', 'void', ['string'], [romPath]);
        setStatus('Playing: ' + file.name);
      };
      reader.readAsArrayBuffer(file);
    });
    return;
  }

  loadCore(bundle, function() {
    setStatus('Loading ' + file.name + '...');
    const reader = new FileReader();
    reader.onload = ev => {
      coreModule.FS.writeFile('/rom.bin', new Uint8Array(ev.target.result));
      coreModule.ccall('start_game', 'void', ['string'], ['/rom.bin']);
      setStatus('Playing: ' + file.name);
    };
    reader.readAsArrayBuffer(file);
  });
});
</script>

<!-- PeerJS for WebRTC signaling -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<!-- Core is loaded dynamically based on ROM file extension -->
</body>
</html>
