<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retro TV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; flex-direction: column;
         align-items: center; justify-content: center; height: 100vh; gap: 10px; }
  canvas { display: block; cursor: crosshair; }
  #ui { color: #888; font: 12px monospace; text-align: center; }
  #mp-bar { color: #888; font: 12px monospace; text-align: center; margin-top: 4px; }
  #mp-bar button { background:#222; border:1px solid #444; border-radius:4px; color:#ddd;
                   padding:4px 12px; cursor:pointer; font:12px monospace; }
  #mp-bar button:hover { background:#333; }
  #overlay {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: rgba(0,0,0,0.5);
    color: #ccc; font: 16px monospace; flex-direction: column; gap: 10px;
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #overlay h2 { color: #fff; }
  label {
    display: inline-block; padding: 6px 14px; background: #222;
    border: 1px solid #444; border-radius: 4px; cursor: pointer; color: #ddd;
  }
  label:hover { background: #333; }
  #wrap { position: relative; }

  /* ── Settings gear button ── */
  #settings-btn {
    position: fixed; top: 14px; right: 14px; z-index: 1000;
    background: #222; border: 1px solid #444; border-radius: 6px;
    color: #bbb; font-size: 20px; width: 36px; height: 36px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  #settings-btn:hover { background: #333; color: #ddd; }

  /* ── Settings sidebar ── */
  #settings-panel {
    position: fixed; top: 0; right: -320px; width: 300px; height: 100vh;
    background: #1c1c1c; border-left: 1px solid #2a2a2a;
    z-index: 999; transition: right 0.25s ease;
    overflow-y: auto; padding: 56px 16px 24px;
  }
  #settings-panel.open { right: 0; }
  #settings-panel .s-section { margin-bottom: 18px; }
  #settings-panel .s-title {
    color: #555; font: 10px monospace; text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 8px;
    border-bottom: 1px solid #272727; padding-bottom: 4px;
  }
  #settings-panel .s-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; flex-wrap: wrap;
  }
  #settings-panel label {
    background: none; border: none; padding: 0;
    color: #aaa; font: 11px monospace; cursor: default;
    display: flex; align-items: center; gap: 5px;
  }
  #settings-panel label:hover { background: none; }
  #settings-panel input[type=range] { width: 90px; vertical-align: middle; }
  #settings-panel input[type=number] {
    width: 55px; background: #1a1a1a; border: 1px solid #383838;
    color: #ddd; padding: 2px 4px; border-radius: 4px; font: 11px monospace;
  }
  #settings-panel select {
    background: #1a1a1a; border: 1px solid #383838; color: #ddd;
    padding: 2px 4px; border-radius: 4px; font: 11px monospace;
  }
  #settings-panel .val { color: #ccc; min-width: 28px; }
  #settings-panel .core-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  #settings-panel .core-icon { font-size: 13px; width: 20px; flex-shrink: 0; }
  #settings-panel .core-label { color: #999; font: 11px monospace; }
  #settings-panel .core-note { color: #555; font: 10px monospace; margin-left: 2px; }
</style>
</head>
<body>
<!-- N64Wasm renders here; off-screen so it doesn't appear in layout -->
<canvas id="n64canvas" width="640" height="480"
        style="position:fixed;top:-1000px;left:-1000px;"></canvas>
<script>
// Force preserveDrawingBuffer on n64canvas so texImage2D can read rendered frames
(function() {
  var c = document.getElementById('n64canvas');
  var orig = c.getContext.bind(c);
  c.getContext = function(type, attrs) {
    if (type === 'webgl2' || type === 'webgl') {
      attrs = Object.assign({}, attrs || {}, { preserveDrawingBuffer: true });
    }
    return orig(type, attrs);
  };
})();
</script>

<div id="wrap">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <h2>Retro TV</h2>
    <p>Click to enter &nbsp;|&nbsp; ESC to release mouse</p>
    <p style="font-size:11px; color:#666">
      WASD: move &nbsp;|&nbsp; Mouse: look<br>
      Arrows: D-pad &nbsp;|&nbsp; Z: A &nbsp;|&nbsp; X: B &nbsp;|&nbsp; Enter: Start &nbsp;|&nbsp; Shift: Select
    </p>
  </div>
</div>
<div id="ui">
  <label>Load ROM
    <input type="file" id="rom-input" accept=".gb,.gbc,.gba,.sfc,.smc,.fig,.swc,.bs,.z64,.n64,.v64,.chd,.cue,.bin,.img" hidden multiple>
  </label>
  &nbsp;
  <label>PS1 BIOS
    <input type="file" id="bios-input" accept=".bin" hidden>
  </label>
  &nbsp;
  <label>GBA Save
    <input type="file" id="gba-save-input" accept=".sav,.srm" hidden>
  </label>
  &nbsp; <span id="status">Loading room...</span>
</div>
<!-- ── Settings gear button ── -->
<button id="settings-btn" onclick="document.getElementById('settings-panel').classList.toggle('open')" title="Settings">&#9881;</button>

<!-- ── Settings sidebar ── -->
<div id="settings-panel">
  <div class="s-section">
    <div class="s-title">Cores</div>
    <div class="core-row">
      <span id="core-icon-gbc" class="core-icon">⏳</span>
      <span class="core-label">Game Boy / GBC</span>
    </div>
    <div class="core-row">
      <span id="core-icon-gba" class="core-icon">⏳</span>
      <span class="core-label">Game Boy Advance</span>
    </div>
    <div class="core-row">
      <span id="core-icon-snes" class="core-icon">⏳</span>
      <span class="core-label">SNES</span>
    </div>
    <div class="core-row">
      <span id="core-icon-ps1" class="core-icon">⏳</span>
      <span class="core-label">PS1</span>
      <span id="core-note-ps1" class="core-note"></span>
    </div>
    <div class="core-row">
      <span id="core-icon-n64" class="core-icon">⏳</span>
      <span class="core-label">N64</span>
    </div>
  </div>
  <div class="s-section">
    <div class="s-title">Overscan</div>
    <div class="s-row">
      <label>X <input type="range" id="overscan-x" min="-0.3" max="0.4" step="0.005" value="0.04"></label>
    </div>
    <div class="s-row">
      <label>Y <input type="range" id="overscan-y" min="-0.3" max="0.4" step="0.005" value="0.04"></label>
    </div>
  </div>
  <div class="s-section">
    <div class="s-title">Room</div>
    <div class="s-row">
      <label>Scale
        <input type="range" id="room-scale" min="1" max="60" step="0.5" value="32">
        <span id="room-scale-val" class="val">10</span>
      </label>
    </div>
    <div class="s-row">
      <label>Rot Y° <input type="number" id="room-roty" value="-180" step="5"></label>
    </div>
    <div class="s-row">
      <label>X <input type="number" id="room-tx" value="4" step="1"></label>
      <label>Y <input type="number" id="room-ty" value="21" step="1"></label>
      <label>Z <input type="number" id="room-tz" value="15" step="1"></label>
    </div>
  </div>
  <div class="s-section">
    <div class="s-title">Lamp</div>
    <div class="s-row">
      <label>X <input type="number" id="lamp-x" value="0" step="5"></label>
      <label>Y <input type="number" id="lamp-y" value="-45" step="5"></label>
      <label>Z <input type="number" id="lamp-z" value="-260" step="5"></label>
    </div>
    <div class="s-row">
      <label>Intensity
        <input type="range" id="lamp-intensity" min="0" max="12" step="0.1" value="1">
        <span id="lamp-intensity-val" class="val">1</span>
      </label>
    </div>
  </div>
  <div class="s-section">
    <div class="s-title">TV</div>
    <div class="s-row">
      <label>Emission
        <input type="range" id="tv-intensity" min="0" max="8" step="0.1" value="1.7">
        <span id="tv-intensity-val" class="val">1.7</span>
      </label>
    </div>
    <div class="s-row">
      <label>Cone Yaw° <input type="number" id="cone-yaw" value="0" step="1"></label>
    </div>
    <div class="s-row">
      <label>Pitch° <input type="number" id="cone-pitch" value="-362" step="1"></label>
      <label>Power <input type="number" id="cone-power" value="18.2" step="0.1"></label>
    </div>
  </div>
  <div class="s-section">
    <div class="s-title">Player</div>
    <div class="s-row">
      <label>Feet Y <input type="number" id="my-y" value="20" step="1"></label>
      <label>Eye height <input type="number" id="cat-eye-height" value="-35" step="1"></label>
    </div>
    <div class="s-row">
      <label>Avatar
        <select id="player-model">
          <option value="0">Cat</option>
          <option value="1">Incidental 70</option>
        </select>
      </label>
    </div>
  </div>
</div>
<div id="mp-bar">
  <button onclick="mpHost()">Host</button>
  &nbsp;
  <input id="join-id" placeholder="Peer ID" size="10" style="background:#222;border:1px solid #444;color:#ddd;padding:4px 8px;border-radius:4px;font:12px monospace">
  <button onclick="mpJoin()">Join</button>
  &nbsp; <span id="mp-status" style="color:#aaa;font:12px monospace"></span>
</div>

<script>
const canvas = document.getElementById('canvas');
const overlay = document.getElementById('overlay');

// Size canvas to ~75% of window width, 16:9
(function sizeCanvas() {
  const pad = 80;
  const maxW = Math.round(window.innerWidth * 0.75);
  const maxH = window.innerHeight - pad;
  const aspect = 16 / 9;
  let w = maxW, h = Math.round(maxW / aspect);
  if (h > maxH) { h = maxH; w = Math.round(h * aspect); }
  canvas.width  = w;
  canvas.height = h;
  // Lock dimensions — n64wasm's SDL fires resize events that would otherwise
  // shrink this canvas to the N64 native resolution.
  Object.defineProperty(canvas, 'width',  { get: () => w, set: () => {} });
  Object.defineProperty(canvas, 'height', { get: () => h, set: () => {} });
})();

// ── Module / worker state ─────────────────────────────────────
let rendererModule = null;  // game_renderer.js — always loaded on page open
let coreModule     = null;  // alias for rendererModule; all existing ccall paths work unchanged
let coreWorker     = null;  // active Web Worker running the current libretro core
let n64Module      = null;
let n64Running     = false;

// ── Multiplayer state ─────────────────────────────────────────
let frontendGL  = null;   // Emscripten GL table captured from renderer load
let frontendCtx = null;   // WebGL2 context of #canvas
let peerInst    = null;
let mpConns     = [];
let gameStream  = null;
let mpIsHost    = false;

// Hidden canvas that holds the latest game frame for WebRTC video
const shareCanvas = document.createElement('canvas');
shareCanvas.width = 640; shareCanvas.height = 480;
const shareCtx = shareCanvas.getContext('2d');

// Scratch canvas used to scale frames into shareCanvas
const frameTmp = document.createElement('canvas');
let   frameTmpCtx = null;

// ── Audio state ───────────────────────────────────────────────
let audioCtx    = null;
let audioNode   = null;
let audioPanner = null;

// JS ring buffer — fed by receiveAudio() from worker, drained by ScriptProcessorNode
const AUDIO_RING  = 44100 * 4;   // 2 seconds stereo capacity at max rate
const audioRing   = new Float32Array(AUDIO_RING);
let audioRingWrite = 0;
let audioRingRead  = 0;

function startAudio(sampleRate) {
  // Close previous context if sample rate changed (different core)
  if (audioCtx && audioCtx.sampleRate !== sampleRate) {
    audioCtx.close();
    audioCtx = null; audioNode = null; audioPanner = null;
  }
  if (!audioCtx) {
    try { audioCtx = new AudioContext({ sampleRate: sampleRate }); }
    catch(e) { audioCtx = new AudioContext(); }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Reset ring buffer so we don't play stale samples from a previous core
  audioRingWrite = 0; audioRingRead = 0;

  if (audioNode) return; // ScriptProcessor already wired for this context

  // ── PannerNode: audio source fixed at the TV's world position ──
  audioPanner = audioCtx.createPanner();
  audioPanner.panningModel  = 'HRTF';
  audioPanner.distanceModel = 'inverse';
  audioPanner.refDistance   = 80;
  audioPanner.maxDistance   = 2000;
  audioPanner.rolloffFactor = 4;

  if (rendererModule) {
    const tvx = rendererModule._get_tv_x();
    const tvy = rendererModule._get_tv_y();
    const tvz = rendererModule._get_tv_z();
    if (audioPanner.positionX !== undefined) {
      audioPanner.positionX.value = tvx;
      audioPanner.positionY.value = tvy;
      audioPanner.positionZ.value = tvz;
    } else {
      audioPanner.setPosition(tvx, tvy, tvz);
    }
  }

  // 4096-sample ScriptProcessor, no inputs, 2 stereo output channels
  audioNode = audioCtx.createScriptProcessor(4096, 0, 2);
  audioNode.onaudioprocess = function(ev) {
    const L = ev.outputBuffer.getChannelData(0);
    const R = ev.outputBuffer.getChannelData(1);
    for (let i = 0; i < L.length; i++) {
      if (audioRingWrite - audioRingRead >= 2) {
        L[i] = audioRing[audioRingRead % AUDIO_RING]; audioRingRead++;
        R[i] = audioRing[audioRingRead % AUDIO_RING]; audioRingRead++;
      } else {
        L[i] = R[i] = 0;
      }
    }
  };

  // Chain: ScriptProcessor → PannerNode → speakers
  audioNode.connect(audioPanner);
  audioPanner.connect(audioCtx.destination);

  // Per-frame listener (player ears) update driven by renderer position
  (function updateListener() {
    if (audioCtx && rendererModule) {
      const lx  = rendererModule._get_local_x();
      const ly  = rendererModule._get_local_y();
      const lz  = rendererModule._get_local_z();
      const yaw = rendererModule._get_local_yaw();
      const pit = rendererModule._get_local_pitch();
      const cosPit = Math.cos(pit);
      const fx = cosPit * Math.sin(yaw);
      const fy = Math.sin(pit);
      const fz = cosPit * Math.cos(yaw);
      const listener = audioCtx.listener;
      if (listener.positionX !== undefined) {
        listener.positionX.value = lx;
        listener.positionY.value = ly;
        listener.positionZ.value = lz;
        listener.forwardX.value  = fx;
        listener.forwardY.value  = fy;
        listener.forwardZ.value  = fz;
        listener.upX.value = 0; listener.upY.value = 1; listener.upZ.value = 0;
      } else {
        listener.setPosition(lx, ly, lz);
        listener.setOrientation(fx, fy, fz, 0, 1, 0);
      }
    }
    requestAnimationFrame(updateListener);
  })();
}

// ── Worker message handler ────────────────────────────────────
function onWorkerMessage(e) {
  const msg = e.data;
  if (msg.type === 'ready') {
    startAudio(msg.sampleRate);
    setStatus('Playing');
  } else if (msg.type === 'frame') {
    receiveFrame(msg.buf, msg.w, msg.h);
  } else if (msg.type === 'audio') {
    receiveAudio(msg.samples);
  }
}

function receiveAudio(buf) {
  const s = new Int16Array(buf);
  for (let i = 0; i < s.length; i++) {
    audioRing[audioRingWrite % AUDIO_RING] = s[i] / 32768.0;
    audioRingWrite++;
  }
}

// Sample 4 quadrant average colors from a raw RGBA buffer and push to renderer.
// Used by libretro core frames (replaces canvas-based jsUpdateQuadColors for this path).
function jsUpdateQuadColors_fromBuffer(rgba, fw, fh) {
  if (!rendererModule) return;
  const hw = fw >> 1, hh = fh >> 1;
  // q0=left-bottom, q1=right-bottom, q2=left-top, q3=right-top
  const regions = [
    [0,  hw, hh, fh],
    [hw, fw, hh, fh],
    [0,  hw, 0,  hh],
    [hw, fw, 0,  hh]
  ];
  const cols = [];
  for (const [x0, x1, y0, y1] of regions) {
    let r = 0, g = 0, b = 0, cnt = 0;
    for (let y = y0; y < y1; y += 4)
      for (let x = x0; x < x1; x += 4) {
        const i = (y * fw + x) * 4;
        r += rgba[i]; g += rgba[i+1]; b += rgba[i+2]; cnt++;
      }
    cols.push(r/(cnt*255), g/(cnt*255), b/(cnt*255));
  }
  rendererModule.ccall('set_tv_quad_colors', null, Array(12).fill('number'), cols);
}

function receiveFrame(buf, fw, fh) {
  if (!rendererModule || !frontendGL || !frontendCtx) return;
  rendererModule.ccall('set_frame_size', 'void', ['number','number'], [fw, fh]);
  const texId = rendererModule.ccall('get_game_tex_id', 'number', [], []);
  const tex = frontendGL.textures[texId];
  if (!tex) return;

  const rgba = new Uint8ClampedArray(buf, 0, fw * fh * 4);
  frontendCtx.bindTexture(frontendCtx.TEXTURE_2D, tex);
  frontendCtx.texImage2D(frontendCtx.TEXTURE_2D, 0,
    frontendCtx.RGBA, fw, fh, 0, frontendCtx.RGBA, frontendCtx.UNSIGNED_BYTE, rgba);
  frontendCtx.texParameteri(frontendCtx.TEXTURE_2D, frontendCtx.TEXTURE_MIN_FILTER, frontendCtx.LINEAR);
  frontendCtx.texParameteri(frontendCtx.TEXTURE_2D, frontendCtx.TEXTURE_MAG_FILTER, frontendCtx.LINEAR);

  jsUpdateQuadColors_fromBuffer(rgba, fw, fh);

  // Mirror to shareCanvas for WebRTC host streaming
  if (mpIsHost) {
    if (frameTmp.width !== fw || frameTmp.height !== fh) {
      frameTmp.width = fw; frameTmp.height = fh;
      frameTmpCtx = frameTmp.getContext('2d');
    }
    frameTmpCtx.putImageData(new ImageData(rgba, fw, fh), 0, 0);
    shareCtx.drawImage(frameTmp, 0, 0, 640, 480);
  }
}

// ── Multiplayer helpers ───────────────────────────────────────
function mpSetStatus(msg) {
  document.getElementById('mp-status').textContent = msg;
}

// Sample a video source (canvas or video element) into 4 quadrant average colours.
// Used by N64 and guest-stream modes where frames don't come through receiveFrame.
const _quadSampleCanvas = document.createElement('canvas');
_quadSampleCanvas.width = 2; _quadSampleCanvas.height = 2;
const _quadSampleCtx = _quadSampleCanvas.getContext('2d', { willReadFrequently: true });
function jsUpdateQuadColors(source) {
  if (!rendererModule) return;
  try {
    _quadSampleCtx.drawImage(source, 0, 0, 2, 2);
    const d = _quadSampleCtx.getImageData(0, 0, 2, 2).data;
    // 2×2 layout (y=0 top): d[0..3]=TL d[4..7]=TR d[8..11]=BL d[12..15]=BR
    // Must match C++ quad order: q0=left-bottom, q1=right-bottom, q2=left-top, q3=right-top
    rendererModule.ccall('set_tv_quad_colors', null,
      ['number','number','number','number','number','number',
       'number','number','number','number','number','number'],
      [d[8]/255,  d[9]/255,  d[10]/255,   // q0 BL
       d[12]/255, d[13]/255, d[14]/255,   // q1 BR
       d[0]/255,  d[1]/255,  d[2]/255,    // q2 TL
       d[4]/255,  d[5]/255,  d[6]/255]);  // q3 TR
  } catch(e) { console.warn('jsUpdateQuadColors:', e); }
}

// Start capturing game frames into shareCanvas for WebRTC streaming.
// Actual blit happens inside receiveFrame() (libretro) or the N64 copyLoop.
function startFrameCapture() {
  gameStream = shareCanvas.captureStream(30);
}

// Blit received video stream into the TV texture (guest-side WebRTC receive)
function setupVideoReceive(stream) {
  const videoEl = document.createElement('video');
  videoEl.autoplay = true; videoEl.playsInline = true; videoEl.muted = true;
  videoEl.srcObject = stream;
  videoEl.play().catch(e => console.warn('mp video:', e));

  const texId = rendererModule.ccall('get_game_tex_id', 'number', [], []);
  rendererModule.ccall('set_frame_size', 'void', ['number','number'], [640, 480]);
  rendererModule.ccall('set_js_colors', 'void', ['number'], [1]);
  (function blitLoop() {
    if (videoEl.readyState >= 2 && frontendGL && frontendCtx) {
      const tex = frontendGL.textures[texId];
      if (tex) {
        frontendCtx.bindTexture(frontendCtx.TEXTURE_2D, tex);
        frontendCtx.texImage2D(frontendCtx.TEXTURE_2D, 0,
          frontendCtx.RGBA, frontendCtx.RGBA, frontendCtx.UNSIGNED_BYTE, videoEl);
        frontendCtx.texParameteri(frontendCtx.TEXTURE_2D,
          frontendCtx.TEXTURE_MIN_FILTER, frontendCtx.LINEAR);
        jsUpdateQuadColors(videoEl);
      }
    }
    requestAnimationFrame(blitLoop);
  })();
}

let localModel = 0; // 0=cat, 1=incidental_70

function startPositionSync(conn) {
  setInterval(function() {
    if (!conn.open || !rendererModule) return;
    conn.send({ type: 'pos',
      x:      rendererModule.ccall('get_local_x',      'number', [], []),
      y:      rendererModule.ccall('get_local_y',      'number', [], []),
      z:      rendererModule.ccall('get_local_z',      'number', [], []),
      yaw:    rendererModule.ccall('get_local_yaw',    'number', [], []),
      moving: rendererModule.ccall('get_local_moving', 'number', [], []),
      model:  localModel
    });
  }, 50); // 20 Hz
}

function mpHost() {
  mpIsHost = true;
  startFrameCapture();
  peerInst = new Peer();
  peerInst.on('error', e => mpSetStatus('Peer error: ' + e.type));
  peerInst.on('open', function(id) {
    mpSetStatus('Your ID: ' + id + '  (share with guest)');
  });
  peerInst.on('connection', function(conn) {
    mpConns.push(conn);
    const remoteId = mpConns.length - 1;
    conn.on('open', function() {
      mpSetStatus('Guest connected');
      startPositionSync(conn);
    });
    conn.on('data', function(data) {
      if (data.type === 'pos' && rendererModule) {
        rendererModule.ccall('set_remote_player', 'void',
          ['number','number','number','number','number','number'],
          [remoteId, data.x, data.y, data.z, data.yaw, data.moving || 0]);
        rendererModule.ccall('set_remote_player_model', 'void',
          ['number','number'], [remoteId, data.model || 0]);
      }
    });
    conn.on('close', function() {
      if (rendererModule) rendererModule.ccall('remove_remote_player','void',['number'],[remoteId]);
      mpConns.splice(mpConns.indexOf(conn), 1);
      mpSetStatus('Guest disconnected');
    });
  });
  peerInst.on('call', function(call) {
    call.answer(gameStream || new MediaStream());
  });
}

function mpJoin() {
  const hostId = document.getElementById('join-id').value.trim();
  if (!hostId) { mpSetStatus('Enter a peer ID first'); return; }
  mpIsHost = false;
  // Renderer is already loaded — connect directly without loading a core bundle
  mpSetStatus('Connecting...');
  peerInst = new Peer();
  peerInst.on('error', e => mpSetStatus('Peer error: ' + e.type));
  peerInst.on('open', function() {
    // Data channel for position sync
    const conn = peerInst.connect(hostId, { reliable: false });
    conn.on('open', function() {
      mpSetStatus('In room with ' + hostId);
      startPositionSync(conn);
    });
    conn.on('data', function(data) {
      if (data.type === 'pos' && rendererModule) {
        rendererModule.ccall('set_remote_player', 'void',
          ['number','number','number','number','number','number'],
          [0, data.x, data.y, data.z, data.yaw, data.moving || 0]);
        rendererModule.ccall('set_remote_player_model', 'void',
          ['number','number'], [0, data.model || 0]);
      }
    });
    conn.on('close', function() {
      if (rendererModule) rendererModule.ccall('remove_remote_player','void',['number'],[0]);
      mpSetStatus('Host disconnected');
    });

    // Video — caller must include a video track in the offer so the SDP has a
    // video section; otherwise the answerer (host) can't send their stream back.
    const dummyCanvas = document.createElement('canvas');
    dummyCanvas.width = 2; dummyCanvas.height = 2;
    const callStream = dummyCanvas.captureStream
      ? dummyCanvas.captureStream(1)
      : new MediaStream();
    const call = peerInst.call(hostId, callStream);
    call.on('stream', function(stream) {
      const vTracks = stream.getVideoTracks();
      if (!vTracks.length) { mpSetStatus('No video track received'); return; }
      mpSetStatus('Receiving game from ' + hostId);
      setupVideoReceive(new MediaStream(vTracks));
    });
    call.on('error', e => mpSetStatus('Call error: ' + e));
  });
}

// ── Core routing ──────────────────────────────────────────────
const CORE_MAP = {
  'gb':  'core_gbc.js',
  'gbc': 'core_gbc.js',
  'gba': 'core_gba.js',
  'sfc': 'core_snes.js',
  'smc': 'core_snes.js',
  'fig': 'core_snes.js',
  'swc': 'core_snes.js',
  'bs':  'core_snes.js',
  'bin': 'core_ps1.js',
  'cue': 'core_ps1.js',
  'chd': 'core_ps1.js',
  'img': 'core_ps1.js',
};
const N64_EXTS = new Set(['z64', 'n64', 'v64']);
const PS1_EXTS = new Set(['bin', 'cue', 'chd', 'img']);

let ps1BiosLoaded = false;

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

window.onerror = function(msg, src, line) {
  setStatus('JS error: ' + msg + ' (' + (src||'').split('/').pop() + ':' + line + ')');
};

// Inject a <script> tag and poll until window.Module.calledRun is true.
// Used for game_renderer.js (main thread) and n64wasm.js.
function injectAndWait(src, onReady, onError) {
  const s = document.createElement('script');
  s.src = src;
  s.onerror = function() { setStatus('Failed to load ' + src); if (onError) onError(); };
  document.body.appendChild(s);
  function check() {
    if (window.Module && window.Module.calledRun) {
      onReady(window.Module);
    } else {
      setTimeout(check, 100);
    }
  }
  setTimeout(check, 200);
}

// Terminate any running core worker and spin up a new one for the given bundle.
function spawnCoreWorker(bundle, file, ext) {
  if (coreWorker) { coreWorker.terminate(); coreWorker = null; }
  n64Running = false;  // stop N64 copyLoop from blitting over the new core's frames
  setStatus('Loading core...');
  const reader = new FileReader();
  reader.onload = function(ev) {
    coreWorker = new Worker('core_worker.js');
    coreWorker.onmessage = onWorkerMessage;
    coreWorker.onerror = function(e) { setStatus('Worker error: ' + (e.message || e)); };
    const msg = {
      type:    'load',
      bundle:  bundle,
      romName: file.name,
      romBytes: ev.target.result   // transferred (zero-copy)
    };
    if (PS1_EXTS.has(ext) && window._ps1BiosBytes) {
      msg.biosName  = window._ps1BiosName;
      msg.biosBytes = window._ps1BiosBytes.buffer.slice(0);  // copy — keep original
    }
    if (ext === 'gba' && window._gbaSaveBytes) {
      msg.saveBytes = window._gbaSaveBytes.buffer.slice(0);
    }
    coreWorker.postMessage(msg, [msg.romBytes]);
  };
  reader.readAsArrayBuffer(file);
}

// ── N64 loading ───────────────────────────────────────────────
// n64wasm.js (Emscripten 2.0.7) uses var/function declarations that conflict
// with let/class in newer Emscripten output.  Fix: fetch as text, wrap in an
// IIFE, expose only Module via window._n64M.
function loadN64Wasm(callback) {
  window._n64ModuleInit = {
    canvas: document.getElementById('n64canvas'),
    noInitialRun: true,
    locateFile: function(path) { return path; }
  };
  fetch('n64wasm.js')
    .then(function(r) { return r.text(); })
    .then(function(code) {
      var wrapped = '(function(){\nvar Module=window._n64ModuleInit||{};\n'
                  + code
                  + '\nif(typeof FS!=="undefined")Module.FS=FS;\n'
                  + 'if(typeof callMain!=="undefined")Module.callMain=callMain;\n'
                  + 'window._n64M=Module;\n})();';
      var blob = new Blob([wrapped], {type: 'application/javascript'});
      var url  = URL.createObjectURL(blob);
      var s = document.createElement('script');
      s.src = url;
      s.onerror = function() { setStatus('Failed to execute n64wasm.js'); };
      document.body.appendChild(s);
      (function check() {
        if (window._n64M && window._n64M.calledRun) {
          URL.revokeObjectURL(url);
          callback(window._n64M);
        } else {
          setTimeout(check, 100);
        }
      })();
    })
    .catch(function() { setStatus('Failed to fetch n64wasm.js'); });
}

function loadN64(file) {
  if (n64Running) {
    if (!confirm('Loading another N64 ROM requires a page reload. Continue?')) return;
    location.reload();
    return;
  }
  // Stop any running libretro worker
  if (coreWorker) { coreWorker.terminate(); coreWorker = null; }

  setStatus('Loading N64 emulator...');

  // Renderer is already loaded — set up game texture for N64 resolution
  var texId = rendererModule.ccall('get_game_tex_id', 'number', [], []);
  rendererModule.ccall('set_frame_size', 'void', ['number','number'], [640, 480]);
  rendererModule.ccall('set_js_colors', 'void', ['number'], [1]);

  loadN64Wasm(function(n64Mod) {
    n64Module = n64Mod;

    setStatus('Loading ' + file.name + '...');
    var reader = new FileReader();
    reader.onload = function(ev) {
      var romBytes = new Uint8Array(ev.target.result);

      // N64Wasm requires assets.zip, config.txt, and cheat.txt before callMain
      fetch('assets.zip')
        .then(function(r) { return r.arrayBuffer(); })
        .then(function(assetsBuf) {
          var fs = n64Module.FS;
          fs.writeFile('assets.zip', new Uint8Array(assetsBuf));

          var cfg = [
            '12','13','14','15','0','2','9','4','6','5','11','-1','-1','-1','-1',
            'b','n','y','h','Enter','i','k','j','l','a','q','e','s','d','`',
            'Up','Down','Left','Right',
            '0','0','0',   // save files
            '0','0','1',   // fps, swap sticks, disable audio sync
            '0','0','0',   // invert Y axis 2/3/4P
            '0','0','0','0'
          ].join('\r\n') + '\r\n';
          fs.writeFile('config.txt', cfg);
          fs.writeFile('cheat.txt', '');
          fs.writeFile('custom.v64', romBytes);

          try { new AudioContext().resume(); } catch(e) {}
          n64Module.callMain(['custom.v64']);
          n64Running = true;
          setStatus('Playing: ' + file.name);

          // Copy n64canvas → g_game_tex every frame via intermediate 2D canvas.
          // Firefox refuses texImage2D(webgl2Canvas) into a WebGL1 context, so
          // we go through a 2D canvas first.  frontendGL/frontendCtx were
          // captured at renderer load time before n64wasm overwrote window.GL.
          var n64canvas = document.getElementById('n64canvas');
          var blitCanvas = document.createElement('canvas');
          blitCanvas.width  = n64canvas.width;
          blitCanvas.height = n64canvas.height;
          var blit2d = blitCanvas.getContext('2d');
          (function copyLoop() {
            if (n64Running) {
              var tex = frontendGL.textures[texId];
              if (tex) {
                blit2d.drawImage(n64canvas, 0, 0);
                jsUpdateQuadColors(blitCanvas);
                frontendCtx.bindTexture(frontendCtx.TEXTURE_2D, tex);
                frontendCtx.texImage2D(frontendCtx.TEXTURE_2D, 0,
                  frontendCtx.RGBA, frontendCtx.RGBA,
                  frontendCtx.UNSIGNED_BYTE, blitCanvas);
                frontendCtx.texParameteri(frontendCtx.TEXTURE_2D,
                  frontendCtx.TEXTURE_MIN_FILTER, frontendCtx.LINEAR);
                frontendCtx.texParameteri(frontendCtx.TEXTURE_2D,
                  frontendCtx.TEXTURE_MAG_FILTER, frontendCtx.LINEAR);
                // Mirror to shareCanvas for WebRTC streaming
                shareCtx.drawImage(blitCanvas, 0, 0, 640, 480);
              }
            }
            requestAnimationFrame(copyLoop);
          })();
        })
        .catch(function() { setStatus('Failed to load assets.zip'); });
    };
    reader.readAsArrayBuffer(file);
  });
}

// ── Pointer lock ──────────────────────────────────────────────
canvas.addEventListener('click', () => canvas.requestPointerLock());

document.addEventListener('pointerlockchange', () => {
  overlay.classList.add('hidden');
});

document.addEventListener('mousemove', e => {
  if (document.pointerLockElement === canvas && rendererModule) {
    rendererModule.ccall('add_mouse_delta', 'void', ['number','number'],
                 [e.movementX, e.movementY]);
  }
});

// ── Input ─────────────────────────────────────────────────────
const MOVE_MAP = { 'KeyW':0, 'KeyS':1, 'KeyA':2, 'KeyD':3 };

// RETRO_DEVICE_ID_JOYPAD: B=0 Y=1 SELECT=2 START=3 UP=4 DOWN=5 LEFT=6 RIGHT=7 A=8
const GAME_MAP = {
  'ArrowUp':    4,
  'ArrowDown':  5,
  'ArrowLeft':  6,
  'ArrowRight': 7,
  'Enter':      3,
  'ShiftLeft':  2,
  'ShiftRight': 2,
  'KeyZ':       8,   // A button
  'KeyX':       0,   // B button
  'KeyQ':      10,   // L
  'KeyE':      11,   // R
};

document.addEventListener('keydown', e => {
  // WASD → renderer (player movement)
  if (MOVE_MAP[e.code] !== undefined && rendererModule) {
    e.preventDefault();
    rendererModule.ccall('set_move_key','void',['number','number'],[MOVE_MAP[e.code],1]);
  }
  // Game buttons → worker (emulator input)
  if (GAME_MAP[e.code] !== undefined) {
    e.preventDefault();
    if (coreWorker) coreWorker.postMessage({ type: 'button', id: GAME_MAP[e.code], pressed: true });
  }
});

document.addEventListener('keyup', e => {
  if (MOVE_MAP[e.code] !== undefined && rendererModule)
    rendererModule.ccall('set_move_key','void',['number','number'],[MOVE_MAP[e.code],0]);
  if (GAME_MAP[e.code] !== undefined && coreWorker)
    coreWorker.postMessage({ type: 'button', id: GAME_MAP[e.code], pressed: false });
});

// ── Sliders ───────────────────────────────────────────────────
function applyRoomXform() {
  if (!coreModule) return;
  const scale = parseFloat(document.getElementById('room-scale').value);
  const rotY  = parseFloat(document.getElementById('room-roty').value) || 0;
  const tx    = parseFloat(document.getElementById('room-tx').value)   || 0;
  const ty    = parseFloat(document.getElementById('room-ty').value)   || 0;
  const tz    = parseFloat(document.getElementById('room-tz').value)   || 0;
  document.getElementById('room-scale-val').textContent = scale;
  coreModule.ccall('set_room_xform', null, ['number','number','number','number','number'],
                   [scale, rotY, tx, ty, tz]);
}
['room-scale','room-roty','room-tx','room-ty','room-tz'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', applyRoomXform);
});

function applyOverscan() {
  if (!coreModule) return;
  const x = parseFloat(document.getElementById('overscan-x').value);
  const y = parseFloat(document.getElementById('overscan-y').value);
  coreModule.ccall('set_overscan', null, ['number', 'number'], [x, y]);
}
document.getElementById('overscan-x').addEventListener('input', applyOverscan);
document.getElementById('overscan-y').addEventListener('input', applyOverscan);

function applyLampPos() {

  const y = parseFloat(document.getElementById('lamp-y').value) || 0;
  const z = parseFloat(document.getElementById('lamp-z').value) || 0;
  coreModule.ccall('set_lamp_pos', null, ['number','number','number'], [x, y, z]);
}
['lamp-x','lamp-y','lamp-z'].forEach(function(id) {

});

function applyLampIntensity() {
  if (!coreModule) return;

  coreModule.ccall('set_lamp_intensity', null, ['number'], [v]);

document.getElementById('lamp-intensity').addEventListener('input', applyLampIntensity);

function applyTvIntensity() {
  if (!coreModule) return;

}
document.getElementById('tv-intensity').addEventListener('input', applyTvIntensity);

function applyConeParams() {
  if (!coreModule) return;
  coreModule.ccall('set_cone_yaw',   null, ['number'], [parseFloat(document.getElementById('cone-yaw').value)]);
  coreModule.ccall('set_cone_pitch', null, ['number'], [parseFloat(document.getElementById('cone-pitch').value)]);

['cone-yaw','cone-pitch','cone-power'].forEach(id =>
  document.getElementById(id).addEventListener('input', applyConeParams));

document.getElementById('my-y').addEventListener('input', function() {

});

document.getElementById('cat-eye-height').addEventListener('input', function() {

document.getElementById('player-model').addEventListener('change', function() {

// ── Core readiness checks ─────────────────────────────────────
let _ps1CoreAvailable = false;

function setCoreIcon(id, ok, note) {
  const icon = document.getElementById('core-icon-' + id);
  if (icon) icon.textContent = ok ? '✅' : '❌';
  if (note !== undefined) {
    const noteEl = document.getElementById('core-note-' + id);
    if (noteEl) noteEl.textContent = note;
  }
}

function checkCores() {
  const coreFiles = { gbc: 'core_gbc.js', gba: 'core_gba.js', snes: 'core_snes.js' };
  Object.entries(coreFiles).forEach(function([id, file]) {
    fetch(file, { method: 'HEAD' })
      .then(function(r) { setCoreIcon(id, r.ok); })
      .catch(function()  { setCoreIcon(id, false); });
  });

  // PS1: core file + BIOS required
  fetch('core_ps1.js', { method: 'HEAD' })
    .then(function(r) {
      _ps1CoreAvailable = r.ok;
      if (!r.ok) { setCoreIcon('ps1', false, '(file missing)'); return; }
      setCoreIcon('ps1', false, '(needs BIOS)');
    })
    .catch(function() { _ps1CoreAvailable = false; setCoreIcon('ps1', false, '(file missing)'); });

  // N64: needs both n64wasm.js and assets.zip
  Promise.all([
    fetch('n64wasm.js',  { method: 'HEAD' }).then(r => r.ok).catch(() => false),
    fetch('assets.zip',  { method: 'HEAD' }).then(r => r.ok).catch(() => false)
  ]).then(function([wasm, assets]) {
    if (wasm && assets) { setCoreIcon('n64', true); }
    else { setCoreIcon('n64', false, wasm ? '(missing assets.zip)' : '(file missing)'); }
  });
}

checkCores();

// ── PS1 BIOS loading ──────────────────────────────────────────
document.getElementById('bios-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    window._ps1BiosName  = file.name;
    window._ps1BiosBytes = new Uint8Array(ev.target.result);
    ps1BiosLoaded = true;
    if (_ps1CoreAvailable) setCoreIcon('ps1', true, '');
    setStatus('BIOS ready: ' + file.name + ' — now load a PS1 disc');
  };
  reader.readAsArrayBuffer(file);
});

// ── GBA Save loading ─────────────────────────────────────────
document.getElementById('gba-save-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    window._gbaSaveBytes = new Uint8Array(ev.target.result);
    setStatus('GBA save loaded: ' + file.name);
  };
  reader.readAsArrayBuffer(file);
});

// ── ROM loading ───────────────────────────────────────────────
document.getElementById('rom-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();

  if (N64_EXTS.has(ext)) {
    loadN64(file);
    return;
  }

  const bundle = CORE_MAP[ext];
  if (!bundle) {
    setStatus('Unsupported format: .' + ext);
    return;
  }

  if (PS1_EXTS.has(ext) && !ps1BiosLoaded) {
    setStatus('Load a PS1 BIOS (.bin) first, then reload your disc');
    return;
  }

  spawnCoreWorker(bundle, file, ext);
});

// ── Eager renderer load ───────────────────────────────────────
// Load the 3D room immediately on page open — no ROM needed.
injectAndWait('game_renderer.js', function(mod) {
  rendererModule = mod;
  coreModule     = mod;   // alias — all slider/MP ccall paths work unchanged
  frontendGL     = window.GL;
  frontendCtx    = document.getElementById('canvas').getContext('webgl2');
  // JS owns quad colors (no g_frame_rgba in the renderer bundle)
  rendererModule.ccall('set_js_colors', 'void', ['number'], [1]);
  // Apply initial slider values now that the module is live
  applyRoomXform();
  applyOverscan();
  applyLampPos();
  applyLampIntensity();
  applyTvIntensity();
  applyConeParams();
  setStatus('Ready — drop a ROM to play');
});
</script>
